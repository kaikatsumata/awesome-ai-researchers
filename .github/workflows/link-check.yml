name: Link check

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check researcher links
        continue-on-error: true
        run: python3 scripts/check-links.py

      - name: Commit report if changed
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain docs/link-check-report.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/link-check-report.md
            git commit -m "chore: update link check report ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "リンクチェック結果に変化なし。コミットをスキップしました。"
          fi
